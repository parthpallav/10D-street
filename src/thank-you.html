    <link rel="stylesheet" href="./css/global.css" />
    <style>
      .thankyou-page {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 3rem 1.5rem;
        background: linear-gradient(rgba(0,0,0,0.54), rgba(0,0,0,0.54)), url("../public/Rectangle 124.webp") center / cover no-repeat;
        text-align: center;
      }

      .thankyou-logo {
        width: min(130px, 28vw);
        margin: 0 auto 2.5rem;
        display: block;
        filter: drop-shadow(0 4px 24px rgba(200,166,92,0.3));
      }

      .thankyou-icon {
        width: 72px;
        height: 72px;
        margin: 0 auto 2rem;
        border-radius: 50%;
        background: linear-gradient(100deg, #c8a65c, #ffe3a8 50%, #c8a65c);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        color: #050403;
        box-shadow: 0 4px 24px rgba(200,166,92,0.35);
      }

      .thankyou-page h1 {
        margin-bottom: 1rem;
        color: var(--gold);
        font-family: "Luxury", serif;
        font-size: clamp(2.5rem, 5vw, 4.5rem);
        font-weight: 400;
        line-height: 1;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .thankyou-page .subtitle {
        max-width: 520px;
        margin: 0 auto 2.5rem;
        color: #fff;
        font-size: clamp(0.95rem, 1.5vw, 1.15rem);
        line-height: 1.8;
        letter-spacing: 0.02em;
      }

      .thankyou-page .note {
        max-width: 440px;
        margin: 0 auto 3rem;
        padding: 1.25rem 1.75rem;
        border: 1px solid rgba(200,166,92,0.4);
        border-radius: 14px;
        background: rgba(222,222,222,0.1);
        backdrop-filter: blur(9px);
        color: var(--gold-light);
        font-size: 0.85rem;
        line-height: 1.7;
      }

      .back-link {
        display: inline-block;
        border: 1px solid var(--gold);
        border-radius: 14px;
        padding: 0.7rem 1.65rem;
        color: #050403;
        background: linear-gradient(100deg, #c8a65c, #ffe3a8 50%, #c8a65c);
        box-shadow: 0 4px 5px rgba(0,0,0,0.35);
        font-family: "Poppins", sans-serif;
        font-size: 1rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-decoration: none;
        transition: transform 160ms ease, filter 160ms ease;
      }

      .back-link:hover,
      .back-link:focus-visible {
        filter: brightness(1.08);
        transform: translateY(-2px);
      }
    </style>
  </head>
  <body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KGQ7ZK3V"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->

    <main class="thankyou-page">
      <img class="thankyou-logo" src="../public/10D-Logo-Sainikpuri-White-1@2x.webp" alt="10 Downing Street" />

      <div class="thankyou-icon" aria-hidden="true">&#10003;</div>

      <h1>Thank You</h1>

      <p class="subtitle">
        Your franchise enquiry has been received.<br />
        Our team will get in touch with you shortly.
      </p>

      <p class="note">
        We typically respond within 1–2 business days. In the meantime, feel free to explore more about the 10 Downing Street brand and our 30-year legacy.
      </p>

      <a class="back-link" href="index.html">Back to Home</a>
    </main>
  </body>
</html>
